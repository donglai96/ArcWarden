# An et al. (2019) arXiv:1901.00953 — Simulation 3.
# v_r/v_th = 1.0 : whistler traps the THERMAL CORE -> phase-space holes + BIPOLAR
# electric fields (electron holes). Table I verbatim.
# Normalization: omega_pe=1, v_th=1 (lambda_D=1), dx = Lx/nx = 2 = 2 lambda_D.
#   ./whistler_pump decks/an2019_sim3.ini [ppc] [amp] [nsteps]

[grid]
nx = 1024
ny = 1
Lx = 2048
Ly = 2

[time]
dt = 0.2
nsteps = 20000        # t_end = 4000 omega_pe^-1

[plasma]
qm = -1.0
eps0 = 1.0
noisy = true
seed = 20260628

[field]
model = darwin
dx_wpe_c = 0.08       # dx*omega_pe/c -> c = dx/0.08 = 25
ndc = 2

[background]
wce = 0.1             # |B0| = omega_ce
theta_deg = 30        # B0 at 30 deg in the x-z plane

[pump]
enable = true
mode = 7              # M -> k0 = 2*pi*M/Lx
w0 = 0.0194
ex0 = 1.35            # Table I amplitudes; ey0 carries the i (-sin) phase
ey0 = 1.81
ez0 = -1.81
amp = 5.0             # scale to reach dB/B0 ~ 0.1 at t_off
trmp = 62.83
toff = 500

[diagnostics]
tsnap = 1200
band_lo = 20
band_hi = 100
prefix = an2019_sim3

[species electrons]
density = 1.0
ppc = 2000
uth = 1 1 1
ufl = 0 0 0
