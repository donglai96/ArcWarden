# Ma, An, Tao, Bortnik, Zhang & Angelopoulos (PoP 2024) — case 7 of the
# EAW_ECH_whistler parameter search (OSIRIS deck eaw_ech_search_case7).
# Anisotropic electrons (T_perp/T_par = 5) in B0 = 0.25 wpe x̂ drive OBLIQUE
# whistlers (theta ~ 48 deg, saturation t ~ 1100/wpe) + Landau-resonant Ex
# time-domain structures at v_ph ~ 0.055 c = 3.3 v_th_par (paper Fig. 1).
# OSIRIS units: c = 1, lengths in c/wpe. dx = 13.5/625 = 0.0216 = 1.29 lambda_D_par.
#   ./eaw2d_yee decks/eaw_case7.ini out [--ppc=N] [--tend=T]

[grid]
nx = 625
ny = 625
Lx = 13.5
Ly = 13.5

[time]
dt = 0.0145           # 0.95 * dx / sqrt(2) (2D light CFL), OSIRIS verbatim
nsteps = 206897       # t_end = 3000 wpe^-1

[plasma]
qm = -1.0
eps0 = 1.0
noisy = true          # instability seeds from shot noise, like OSIRIS
seed = 20260714

[field]
model = yee
c = 1.0
jfilter = 3           # 3-pass binomial J smoothing (OSIRIS smooth order 3)

[background]
wce = 0.25            # omega_ce / omega_pe
theta_deg = 0         # B0 along x (in-plane)

[diagnostics]
prefix = eaw_case7

[species electrons]
density = 1.0
ppc = 400             # OSIRIS num_par_x 20x20
uth = 0.01678 0.03752 0.03752
ufl = 0 0 0
