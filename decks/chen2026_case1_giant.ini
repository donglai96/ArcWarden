# Chen et al., Phys. Plasmas 33, 072105 (2026) — Case I: incoherent whistler
# (Fig. 1 a-c), GPU-LIMIT edition. Runner: ./chirp2d <this file> <outdir> --fullf
#
# Same physics as chen2026_case1.ini; ppc raised 800 -> 110000 (425M markers)
# to drop the full-f shot-noise floor by sqrt(137.5) ~ 11.7x toward their
# quoted 1e-5 seed level, matching the case2_giant run that reproduced their
# repetitive-chorus timeline. tile_sort mandatory at this ppc (flat atomics
# collapse 52x).
#
# Case I: nh/ne0 = 0.0316, A = 1.19 -> Ut_perp = 0.21581.
# Expect (their Fig. 1 a-c): NO chirping, band at ~0.2 We0, weak
# dB/B_e0 ~ 0.003; peak 0.005 at T1 = 16876/We0.

[grid]
nx = 5000
ny = 1
Lx = 1300.0
Ly = 0.26

[time]
dt = 0.15
nsteps = 583333          # t_end = 17500/We0 = 87500/wpe

[field]
model = yee
jfilter = 3
tile_sort = 25             # M9 tiled deposit: mandatory at this ppc (flat-path atomics: 52x slower)

[plasma]
qm = -1.0
cold_nc = 0.9684         # ne0 - nh (total wpe^2 = 1)
rel = true               # 20 keV, Ut_perp up to 0.38c
noisy = true
seed = 20260720

[background]
wce = 0.2
profile = dipole
lre = 1330.504           # L*R_E_eff in c/wpe (x10 compressed, see header)

[boundary]
x = hybrid
nd = 300                 # 78 c/wpe Umeda layers (paper: bare reflection;
numax = 0.1              # noted as a deliberate difference)

[antenna]
amp = 0.0                # NO antenna — self-seeding from shot noise

[species hot]
density = 0.0316
ppc = 110000             # GPU-limit run: 425M markers (~25.5 GB with sort buffers)
uth = 0.19783565 0.21581321 0.21581321
rep = fullf
dist = losscone
rho = 1.0
kappa = 0.3

[diagnostics]
probes = -233.0 -116.4 0.0 116.4 233.0    # lat -10, -5, 0, +5, +10 deg
