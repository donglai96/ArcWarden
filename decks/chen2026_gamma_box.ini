# Linear-growth gate for Chen 2026 Case II equatorial parameters: UNIFORM
# field (dipole with lre so large that b-1 < 1e-8), PERIODIC x, band-limited
# 1e-5 seed. Theory (their BO solver, nonrel): Gamma_L = 4.6e-3 We at
# w = 0.22 We. Run nonrel first; rel=true variant measures the relativistic
# reduction.
[grid]
nx = 512
ny = 1
Lx = 133.12
Ly = 0.26
[time]
dt = 0.15
nsteps = 30000        # t = 4500/wpe = 900/We
[field]
model = yee
jfilter = 3
[plasma]
qm = -1.0
cold_nc = 0.9822
rel = false
noisy = true
seed = 20260722
bnoise = 1.0e-5
[background]
wce = 0.2
profile = dipole
lre = 1.0e9           # uniform to 1e-14
[boundary]
x = periodic
[antenna]
amp = 0.0
[species hot]
density = 0.0178
ppc = 2000
uth = 0.19783565 0.24390817 0.24390817
rep = deltaf
dist = losscone
rho = 1.0
kappa = 0.3
[diagnostics]
probes = -20 -10 0 10 20
