# M4 — Tao GRL17 rising-tone chirping through the 2D Yee code path (ny = 1).
# Target: re-verify the chirp1d reproduction (tag v1d-chirping-tao2017,
# docs/TAO2017_REPRODUCTION.md) in the production 2D code.
#
# *** NOT YET RUNNABLE — M4 remaining wiring, in order: ***
#  1. multi-species with per-species load: the Yee branch is FULL PIC (no cold
#     fluid, unlike chirp1d/DAWN) -> cold e- must be a PIC species. An ISO
#     species in a mirror is an (E,mu) equilibrium with UNIFORM density and
#     T(x) = const, so the standard loader already handles the cold species;
#     only the anisotropic hot species needs initialize_mirror. arcsim
#     currently restricts b0_prof to exactly one species.
#  2. representation: first light = full-f BOTH species (chirp1d finding:
#     full-f at nh = 0.6% self-seeds noisy packets; antenna-triggered also
#     works). Hot delta-f + cold full-f is the M8 representation study.
#  3. relativistic push option: uth_perp = 0.53c is strongly relativistic;
#     chirp1d measured gamma_growth 20-35% lower relativistic. Gate plan:
#     compare 2D path (nonrel) vs chirp1d nonrel flag FIRST (apples to
#     apples), then add the relativistic Yee push.
#  4. antenna amplitude re-tune: chirp1d ant_amp = 0.04 is in Omega_e0 = c = 1
#     units; re-tune here for dB_trig/B0 ~ 1e-3 at the antenna.
#
# UNIT CONVERSION (chirp1d Omega_e0 = c = 1  ->  Yee branch wpe = 1, c = 1):
#   wpe/wce = 5  ->  wce = 0.2;  1 c/Owce = 5 c/wpe (lengths x5, times x5)
#   domain +-164 c/Oce = 1640 c/wpe;  dh = 0.05 c/Oce -> dx = 0.25 c/wpe
#   a = 8.62e-5 (Oce/c)^2 -> a = 8.62e-5/25 = 3.448e-6 (wpe/c)^2
#   dt = 0.02/Oce -> 0.1/wpe (CFL c dt/dx = 0.4);  T = 1e4/Oce -> 5e4/wpe
#   mask 15 c/Oce = 300 cells; w0 = 0.25 wce = 0.05 wpe
#   element 0.25->0.7 wce over t = 3000-10000 /wpe, dw/dt = 4.2e-4 wce^2

[grid]
nx = 6560
ny = 1
Lx = 1640.0
Ly = 0.25

[time]
dt = 0.1
nsteps = 500000

[field]
model = yee

[background]
wce = 0.2
profile = parabolic
a = 3.448e-6
# xc defaults to Lx/2

[boundary]
x = hybrid
nd = 300
numax = 0.1

[antenna]
amp = 0.04        # PENDING re-tune (chirp1d units), target dB/B0 ~ 1e-3
x0 = 3280         # cells: domain center
sigma = 4
w0 = 0.05         # 0.25 wce
trmp = 250
toff = 2500

[species cold]
density = 0.994
ppc = 400
uth = 0.01 0.01 0.01

[species hot]
density = 0.006
ppc = 4096
uth = 0.2 0.53 0.53
# rep = deltaf    # PENDING: hot delta-f + cold full-f is the M8 study

[diagnostics]
enable = spectrum kt snapshot em_energy
tsnap = 10000
band_lo = 1
band_hi = 200
kt_stride = 10
prefix = chirp2d
