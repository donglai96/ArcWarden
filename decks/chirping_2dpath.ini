# M4 — Tao GRL17 rising-tone chirping through the 2D Yee code path (ny = 1).
# Runner: ./chirp2d <this file> <outdir> [--ppc= --amp= --nsteps=]
# Architecture = chirp1d/DAWN: hot PIC (delta-f, mirror-equilibrium load) +
# linearized cold fluid ([plasma] cold_nc — a kinetic cold species at this
# grid would have lambda_D ~ dx/25) + parabolic B0(x) + Umeda hybrid layers +
# triggering antenna. Yee push is NONRELATIVISTIC (gamma = 1) — chirp1d
# measured relativity lowering growth 20-35% at these uth; compare against
# chirp1d nonrel, not the relativistic paper numbers, until the rel push lands.
#
# UNIT CONVERSION (chirp1d Omega_e0 = c = 1  ->  Yee branch wpe = 1, c = 1):
#   wpe/wce = 5 -> wce = 0.2;  1 c/Oce = 5 c/wpe (lengths x5, times x5)
#   domain +-164 c/Oce = 1640 c/wpe;  dh = 0.05 c/Oce -> dx = 0.25 c/wpe
#   a = 8.62e-5 (Oce/c)^2 -> 3.448e-6 (wpe/c)^2;  dt = 0.02/Oce -> 0.1/wpe
#   mask 15 c/Oce = 300 cells;  w0 = 0.25 wce = 0.05 wpe;  T = 1e4/Oce = 5e4/wpe
#   expected element: 0.25 -> 0.7 wce over t = 3000-10000/wpe (chirp1d
#   relativistic: dw/dt = 4.2e-4 wce^2)

[grid]
nx = 6560
ny = 1
Lx = 1640.0
Ly = 0.25

[time]
dt = 0.1
nsteps = 500000

[field]
model = yee

[plasma]
qm = -1.0
cold_nc = 0.994
noisy = true
seed = 20260718

[background]
wce = 0.2
profile = parabolic
a = 3.448e-6
# xc defaults to Lx/2

[boundary]
x = hybrid
nd = 300
numax = 0.1

[antenna]
amp = 1.0e-4      # calibrated 2026-07-18: dB_trig/B0 ~ 1e-3 at the antenna
x0 = 3280         # cells: equator
sigma = 4
w0 = 0.05         # 0.25 wce
trmp = 250
toff = 2500

[species hot]
density = 0.006
ppc = 4096
uth = 0.2 0.53 0.53
rep = deltaf

[diagnostics]
# chirp2d has its own dump set (bline/probe/energy) — this section unused
