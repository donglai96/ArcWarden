# chirp1d — M4 gate, Chen et al. 2022 GRL-like compressed-domain setup
# (1D gcPIC-df in a dipole; here: parabolic B0 + cold fluid + full-f hot).
# Their run: wpe/wce=5, Tperp/Tpara=6, nh/nc=0.006, v_para/V_Ae=0.442,
# domain +-136 c/wce (lat +-27.6 deg, L~0.5-like steep topology), dt=0.04,
# rising tones 0.25->0.5 wce at t=5800-11300, chirp rate ~3e-4 wce^2.
# Units: Omega_e0 = c = 1.

[chirp]
nx       = 4096
dx       = 0.0664      # L = 272, h in [-136, 136]  (0.34 c/wpe at wpe=5)
dt       = 0.025
nsteps   = 480000      # T = 12000 /wce

wpe      = 5.0
a        = 8.9e-5      # B0(end) = 2.65 (dipole to 27.6 deg equivalent)

nh       = 0.006
uth_para = 0.0884      # 0.442 * V_Ae,  V_Ae = c/(wpe/wce) = 0.2c
uth_perp = 0.2165      # Tperp/Tpara = 6
ppc      = 16384

periodic = false
nd       = 400         # ~27 c/wce damping each side
numax    = 1.0

seed_amp = 0.0
seed     = 20260713

probes        = -60 -30 0 30 60
probe_stride  = 4      # dt_probe = 0.1
frame_stride  = 800    # every 20 /wce
frame_decim   = 2
energy_stride = 400
nphase        = 9
phase_decim   = 256
