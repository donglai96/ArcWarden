# An et al. (2019) arXiv:1901.00953 — Simulation 2.
# v_r/v_th = 2.1 : whistler traps the MID-distribution -> electron-acoustic waves +
# UNIPOLAR (double-layer) electric fields. Table I verbatim.
# Normalization: omega_pe=1, v_th=1 (lambda_D=1), dx = Lx/nx = 2 = 2 lambda_D.
#   ./whistler_pump decks/an2019_sim2.ini [ppc] [amp] [nsteps]

[grid]
nx = 2048
ny = 1
Lx = 4096
Ly = 2

[time]
dt = 0.2
nsteps = 20000        # t_end = 4000 omega_pe^-1

[plasma]
qm = -1.0
eps0 = 1.0
noisy = true
seed = 20260628

[field]
model = darwin
dx_wpe_c = 0.04       # c = dx/0.04 = 50
ndc = 2

[background]
wce = 0.1
theta_deg = 30

[pump]
enable = true
mode = 7
w0 = 0.0194
ex0 = 1.35
ey0 = 1.81
ez0 = -1.81
amp = 6.0
trmp = 62.83
toff = 750

[diagnostics]
tsnap = 2500
band_lo = 20
band_hi = 250
prefix = an2019_sim2

[species electrons]
density = 1.0
ppc = 2000
uth = 1 1 1
ufl = 0 0 0
