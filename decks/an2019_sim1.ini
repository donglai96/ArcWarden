# An et al. (2019) "Unified view of nonlinear wave structures associated with
# whistler-mode chorus" (PRL 122, 045101 / arXiv:1901.00953) — Simulation 1.
# v_r/v_th = 3.2 : whistler traps the distribution TAIL -> beam-mode LANGMUIR waves.
# Table I verbatim. Normalization: omega_pe=1, v_th=1 (lambda_D=1), dx = Lx/nx = 2 = 2 lambda_D.
#   ./whistler_pump decks/an2019_sim1.ini [ppc] [amp] [nsteps]

[grid]
nx = 4096
ny = 1
Lx = 8192
Ly = 2

[time]
dt = 0.2
nsteps = 20000        # t_end = 4000 omega_pe^-1

[plasma]
qm = -1.0
eps0 = 1.0
noisy = true
seed = 20260628

[field]
model = darwin
dx_wpe_c = 0.0267     # c = dx/0.0267 ~= 74.9
ndc = 2

[background]
wce = 0.1
theta_deg = 30

[pump]
enable = true
mode = 10
w0 = 0.0215
ex0 = 1.39
ey0 = 1.81
ez0 = -1.81
amp = 6.0
trmp = 62.83
toff = 1100

[diagnostics]
tsnap = 1540
band_lo = 300
band_hi = 400
prefix = an2019_sim1

[species electrons]
density = 1.0
ppc = 2000
uth = 1 1 1
ufl = 0 0 0
