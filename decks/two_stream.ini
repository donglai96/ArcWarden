# ArcWarden — two-stream instability: two counter-streaming warm beams.
# Run:
#   ./build/run_deck decks/two_stream.ini build/two_stream_deck
#   python3 scripts/plot_phase_movie.py build/two_stream_deck

[grid]
nx = 64
ny = 8
Lx = 10.2633         # 2*pi / sqrt(3/8): box holds the most-unstable mode (omega_pe=1, v0=1)
Ly = 1.0

[time]
dt         = 0.05
nsteps     = 600
dump_every = 10

[plasma]
qm    = -1.0
eps0  = 1.0
wpe   = 1.0
noisy = true
seed  = 20260627

[species beam_plus]
density = 0.5
ppc     = 2048
uth     = 0.1 0.1 0.1
ufl     = 1.0 0.0 0.0

[species beam_minus]
density = 0.5
ppc     = 2048
uth     = 0.1 0.1 0.1
ufl     = -1.0 0.0 0.0
