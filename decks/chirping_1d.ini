# chirp1d — M4 gate: 1D field-aligned rising-tone chorus (Katoh-Omura style).
# Units: Omega_e0 = c = 1.  PROVISIONAL parameters, to be locked to literature.

[chirp]
nx       = 16384
dx       = 0.125        # L = 2048, h in [-1024, 1024]
dt       = 0.05
nsteps   = 200000       # T = 10000 /wce

wpe      = 4.0          # wpe/wce at the equator
a        = 8.5e-7       # B0 = 1 + a h^2  -> B0(ends) ~ 1.89

nh       = 0.01
uth_para = 0.225
uth_perp = 0.60
ppc      = 1024

periodic = false
nd       = 1024         # 128 c/wce damping region each side
numax    = 1.0

seed_amp = 0.0
seed     = 20260713

probes        = -400 -200 0 200 400
probe_stride  = 4       # dt_probe = 0.2 -> Nyquist 15.7 wce
frame_stride  = 400     # every 20 /wce
frame_decim   = 8
energy_stride = 200
nphase        = 9
phase_decim   = 512
