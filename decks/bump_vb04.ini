# ArcWarden — bump-on-tail instability (warm bulk + small tail beam).
# Self-excites from shot noise (noisy load). Run:
#   ./build/run_deck decks/bump_on_tail.ini build/bump_deck
#   python3 scripts/plot_bump_on_tail.py build/bump_deck

[grid]
nx = 512
ny = 8
Lx = 50.265482       # 16*pi  -> mode spacing 0.125, resolves the unstable k-band
Ly = 1.0

[time]
dt         = 0.05
nsteps     = 4000    # t up to 200 / omega_pe
dump_every = 40      # 101 phase-space frames
field_history_every = 2   # dense E(x,t) sampling (dt=0.1) for the omega-k spectrum

[plasma]
qm    = -1.0
eps0  = 1.0
wpe   = 1.0
noisy = true         # grow from physical shot noise, no perturb seed
seed  = 20260627

# NOTE: density (physics) and ppc (#macro-particles) are SEPARATE knobs here.
# Keep ppc proportional to density so all macro-particles have EQUAL weight and
# the beam is correctly ~8% of the particles (matches the equal-weight load).
# Over-resolving the beam (e.g. ppc=1024 for both) lowers beam noise but makes
# unweighted f(v)/scatter plots over-represent the bump.

# warm Maxwellian bulk: ~92% of the density, no drift
[species bulk]
density = 0.92
ppc     = 920
uth     = 0.2 0.2 0.2
ufl     = 0.0 0.0 0.0

# the bump: small fast beam on the tail (positive slope drives the instability)
[species beam]
density = 0.08
ppc     = 80
uth     = 0.15 0.15 0.15
ufl     = 0.4 0.0 0.0
