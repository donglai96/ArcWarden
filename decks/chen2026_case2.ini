# Chen et al., Phys. Plasmas 33, 072105 (2026) — Case II: discrete-element
# chorus (Fig. 1 d-f). Runner: ./chirp2d <this file> <outdir> --fullf
#
# Their model = our chirp2d architecture: 1D field-aligned hot PIC + linearized
# cold electron fluid + dipole B0(s) + particle reflection, waves grow from
# SHOT NOISE (no antenna) -> full-f is mandatory (delta-f has no spontaneous
# emission, HOT_REP_ROUND1.md).
#
# UNITS: their V_Ae0/We0 = c/wpe and We0 = 0.2 wpe (wpe/We = 5), so lengths map
# 1:1 and times x5. Their grid dq = 0.26, 5000 cells (domain +-650 = lat
# +-26.6 deg), dt = 0.03/We0 = 0.15/wpe. Geometry: inhomogeneity downscaled
# x10; calibrated from their "lambda = 5 deg <-> h = 116.4": lre = L*R_E_eff =
# 116.4/s(5deg) = 1330.504 c/wpe. Wall mirror ratio 2.470.
# Hot: T_par = 20 keV -> Ut_par = sqrt(20/511) = 0.1978c; loss-cone subtracted
# bi-Max (their Eq. 1) rho = 1, kappa = 0.3; A = Ut_perp^2/Ut_par^2.
# Case II: nh/ne0 = 0.0178, A = 1.52 -> Ut_perp = 0.24391.
# Expect (their Fig. 1 d-f): single rising-tone element 0.25 -> 0.60 We0
# around t ~ 7000-8000/We0, peak dB/B_e0 = 0.027 at T2 = 7713/We0.

[grid]
nx = 5000
ny = 1
Lx = 1300.0
Ly = 0.26

[time]
dt = 0.15
nsteps = 333333          # t_end = 10000/We0 = 50000/wpe

[field]
model = yee
jfilter = 3              # binomial J-smoothing: kills high-k deposit shot
                         # noise (whistler band kdx ~ 0.13-0.23 is untouched);
                         # our unsmoothed full-f floor was ~60x the paper's

[plasma]
qm = -1.0
cold_nc = 0.9822         # ne0 - nh (total wpe^2 = 1)
rel = true               # 20 keV, Ut_perp up to 0.38c
noisy = true
seed = 20260720

[background]
wce = 0.2
profile = dipole
lre = 1330.504           # L*R_E_eff in c/wpe (x10 compressed, see header)

[boundary]
x = hybrid
nd = 300                 # 78 c/wpe Umeda layers (paper: bare reflection;
numax = 0.1              # noted as a deliberate difference)

[antenna]
amp = 0.0                # NO antenna — self-seeding from shot noise

[species hot]
density = 0.0178
ppc = 800                # matches paper: noise floor IS the seed
uth = 0.19783565 0.24390817 0.24390817
rep = fullf
dist = losscone
rho = 1.0
kappa = 0.3

[diagnostics]
probes = -233.0 -116.4 0.0 116.4 233.0    # lat -10, -5, 0, +5, +10 deg
