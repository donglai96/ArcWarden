dx       = 0.1          # L = 102.4 c/wce
dt       = 0.04
nsteps   = 50000        # T = 2000 /wce

wpe      = 4.0          # wpe/wce
a        = 0.0
periodic = true

nh       = 0.02
uth_para = 0.2
uth_perp = 0.4          # T_perp/T_para = 4  (A = 3)
ppc      = 2048

seed_amp = 0.0
