# chirp1d — M4 gate, Tao 2014 / Tao-Zonca-Chen GRL 2017 "DAWN" setup.
# DAWN is architecturally identical to chirp1d: linearized cold electron fluid
# + relativistic hot PIC, transverse fields only, particle reflection + masked
# field damping, plain bi-Maxwellian hot electrons, spontaneous from noise.
# Their GRL17 chorus element: 0.27 -> 0.67 wce over ~750/wce, dw/dt ~ 5.3e-4.
# Units: Omega_e0 = c = 1.

[chirp]
nx       = 6554
dx       = 0.05        # domain 327.7, h in [-163.85, 163.85]
dt       = 0.02
nsteps   = 250000      # T = 5000 (element expected t~1100-1900)

wpe      = 5.0
a        = 8.62e-5     # "nightside" xi of Tao-Zonca-Chen 2017 (B0 ends ~ 3.3)

nh       = 0.006
uth_para = 0.20
uth_perp = 0.53        # Tperp/Tpara ~ 7
ppc      = 4096
rep      = deltaf

periodic = false
nd       = 300         # 15 c/wce masking regions (DAWN standard)
numax    = 1.0

seed_amp = 1e-6
seed     = 20260713

probes        = -80 -40 0 40 80
probe_stride  = 5      # dt_probe = 0.1
frame_stride  = 1000   # every 20 /wce
frame_decim   = 4
energy_stride = 500
nphase        = 9
phase_decim   = 256
