# Chen et al., GRL 49, e2022GL097989 (2022) — "One-dimensional gcPIC-δf
# simulation of hooked chorus waves in the Earth's inner magnetosphere".
# Runner: ./chirp2d <this file> <outdir>     (rep = deltaf — NOT --fullf)
#
# The gcPIC-δf 1D validation anchor: dipole B0(s), bi-Max hot electrons
# rep=deltaf, drift injection tau_D, waves seeded by an initial field noise
# (delta-f has no spontaneous emission — HOT_REP_ROUND1.md). Their cold
# electrons are δf PARTICLES; ours a linearized fluid (equivalent linear
# response, dispersion gate 0.001%).
#
# UNITS (their Ωe0 = c = 1 → ours wpe = 1): ωpe/Ωe0 = 5 → wce = 0.2, lengths
# in de = c/ωpe map 1:1, times ×5. Geometry: "topology equal to L = 0.5",
# λ ∈ ±27.6°, 4000 cells × 0.34 de → domain ±680 de →
# lre = 680/s(27.6°) = 1335.782 de (≡ 0.5 R_E at their density — SAME scale
# as Chen PoP 2026's 1330.5). dt = 0.04/Ωe0 = 0.2/wpe. τ_D·Ωe0 = 5000 →
# taud = 25000/wpe. Hot: nheq/nc0 = 0.006, β∥ = 0.001 → U∥ = 0.442 V_Ae =
# 0.0884c, T⊥/T∥ = 6 → U⊥ = 0.21653c. ppc 4000.
#
# EXPECT (their Figs. 2-3, spectrogram of δB⊥1 at λ = 5-20°): repetitive
# discrete elements; A (rising 0.25→0.39, Γ = +2.52e-4 Ωe² at t 5800-7400),
# B (rising, t 6700-8400), C (HOOKED: rise Γ = +3.38e-4 to t≈10200, flat,
# then fall Γ = −2.01e-4, t 9500-11300). Amplitudes saturate at λ = 10-15°.

[grid]
nx = 4000
ny = 1
Lx = 1360.0
Ly = 0.34

[time]
dt = 0.2
nsteps = 325000          # Ωe0·t = 13000

[field]
model = yee
jfilter = 3

[plasma]
qm = -1.0
cold_nc = 1.0            # ωpe defined on nc0 (their convention)
rel = true
noisy = true
seed = 20260721
bnoise = 1.0e-5          # initial white δB noise / B_e0 — the δf seed

[background]
wce = 0.2
profile = dipole
lre = 1335.782

[boundary]
x = hybrid
nd = 300
numax = 0.1

[antenna]
amp = 0.0

[species hot]
density = 0.006
ppc = 4000
uth = 0.0884 0.21653489 0.21653489
rep = deltaf
taud = 25000             # drift injection: Ωe0·τ_D = 5000

[diagnostics]
probes = 0.0 116.9 235.4 357.0 482.3    # λ = 0, 5, 10, 15, 20°  (their Fig. 2)
